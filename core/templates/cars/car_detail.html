{% extends 'base.html' %}
{% load i18n %}

{% block content %}
<div class="container mt-5">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="{% url 'cars:car_list' %}">{% trans "Voitures" %}</a></li>
            <li class="breadcrumb-item active">{{ car.brand }} {{ car.model_name }}</li>
        </ol>
    </nav>

    <div class="row g-4">
        <div class="col-md-7">
            <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
                {% if car.image %}
                    <img src="{{ car.image.url }}" class="img-fluid" alt="{{ car.brand }}">
                {% else %}
                    <div class="bg-light d-flex align-items-center justify-content-center" style="height: 400px;">
                        <i class="fas fa-car fa-5x text-muted opacity-25"></i>
                    </div>
                {% endif %}
            </div>
        </div>

        <div class="col-md-5">
            <div class="card border-0 shadow-sm rounded-4 p-4">
                <h2 class="fw-bold">{{ car.brand }} {{ car.model_name }}</h2>
                <p class="text-muted">{{ car.description }}</p>
                
                <hr class="opacity-10">

                <form method="post" action="{% url 'cars:car_detail' car.pk %}">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">{% trans "Nom complet" %}</label>
                        <input type="text" name="customer_name" class="form-control rounded-pill" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">{% trans "Téléphone" %}</label>
                        <input type="tel" name="customer_phone" class="form-control rounded-pill" required>
                    </div>

                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label fw-bold">{% trans "Date de début" %}</label>
                            <input type="date" name="start_date" class="form-control rounded-pill" required>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label fw-bold">{% trans "Date de fin" %}</label>
                            <input type="date" name="end_date" class="form-control rounded-pill" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 fw-bold shadow-sm transition-btn">
                        <i class="fas fa-check-circle me-1"></i> {% trans "Confirmer la réservation" %}
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
